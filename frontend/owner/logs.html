<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Logs | Park Conscious</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .main-gradient {
            background: radial-gradient(circle at top right, #1e40af 0%, transparent 40%),
                radial-gradient(circle at bottom left, #0f766e 0%, transparent 40%),
                radial-gradient(circle at center, #111827 0%, #000000 100%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="bg-gray-950 text-gray-200 main-gradient h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 glass-panel flex-none hidden md:flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-white/5 cursor-pointer"
            onclick="window.location.href='../index.html'">
            <div
                class="relative w-8 h-8 mr-3 flex items-center justify-center bg-gradient-to-br from-blue-600 to-teal-600 rounded-lg shadow-lg overflow-hidden">
                <img src="../assets/logo.jpg" alt="Logo" class="w-full h-full object-cover opacity-90">
            </div>
            <span class="text-lg font-bold text-white tracking-tight">Park <span
                    class="text-teal-400">Owner</span></span>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <a href="dashboard.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
                Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-white/10 text-white font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                Access Logs
            </a>
            <a href="add-parking.html"
                class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
                Add Parking
            </a>
            <a href="#"
                class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                Analytics
            </a>
        </nav>

        <div class="p-4 border-t border-white/5">
            <button onclick="window.location.href='index.html'"
                class="flex items-center gap-3 px-4 py-3 w-full rounded-lg text-red-400 hover:bg-red-500/10 transition-colors text-sm font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto relative">
        <header
            class="h-16 flex items-center justify-between px-8 border-b border-white/5 bg-gray-900/50 backdrop-blur-md sticky top-0 z-10">
            <h2 class="text-xl font-bold text-white">Live Access Logs</h2>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-sm text-gray-400">AI Scanner Online</span>
            </div>
        </header>

        <div class="p-8 max-w-7xl mx-auto">
            <div class="glass-card rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-white/5 border-b border-white/10">
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Time</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Plate Number
                            </th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Location</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody" class="divide-y divide-white/5">
                        <!-- Logs will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        async function fetchLogs() {
            try {
                // Determine API URL
                const API_URL = window.location.hostname === 'localhost'
                    ? 'http://localhost:5050/api/logs'
                    : '/api/logs';

                const response = await fetch(API_URL);
                const data = await response.json();

                const body = document.getElementById('logsBody');
                body.innerHTML = '';

                data.forEach(log => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-white/5 transition-colors';
                    row.innerHTML = `
                        <td class="px-6 py-4 text-sm text-gray-300 font-mono">${new Date(log.timestamp).toLocaleString()}</td>
                        <td class="px-6 py-4">
                            <span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-1 rounded-md font-bold tracking-widest uppercase">
                                ${log.plateNumber}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-400">${log.location}</td>
                        <td class="px-6 py-4">
                            <span class="text-xs bg-green-500/10 text-green-400 border border-green-500/20 px-2 py-0.5 rounded-full">Detected</span>
                        </td>
                    `;
                    body.appendChild(row);
                });

                if (data.length === 0) {
                    body.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-gray-500">No detections logged yet...</td></tr>';
                }
            } catch (error) {
                console.error('Failed to fetch logs:', error);
            }
        }

        // Poll for new logs every 5 seconds
        fetchLogs();
        setInterval(fetchLogs, 5000);
    </script>
</body>

</html>
